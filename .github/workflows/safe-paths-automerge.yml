name: Safe-paths Auto-merge

# Auto-enables `gh pr merge --auto --squash` on any PR (any author) whose
# diff touches ONLY safe paths (docs, tests, test_*.py / *_test.* /
# *.test.* / *.spec.* / **/__tests__/**). All-or-nothing: one unsafe
# file in the diff and this workflow no-ops, deferring to
# claude-author-automerge.yml (or manual click).
#
# Branch protection's required-status-checks still apply — auto-merge
# waits for them. Reusable defined at:
#   topcoder1/ci-workflows/.github/workflows/safe-paths-automerge.yml

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

# The group key partitions runs by the payload's draft flag, not just
# per-PR. A stale draft-payload `synchronize` run is a guaranteed no-op
# (the reusable's draft gate), yet in a shared group it can cancel (or
# replace, if queued) the ready_for_review run, leaving auto-merge
# silently un-enabled (same race as pr-classify.yml — attaxion_dev#303,
# 2026-07-06). Quarantining draft-payload runs fixes that while
# non-draft runs keep today's supersede semantics: a newer push still
# cancels an in-flight stale run before it can arm auto-merge from
# pre-push state.
concurrency:
  group: safe-paths-automerge-${{ github.event.pull_request.number }}-${{ github.event.pull_request.draft && 'draft' || 'live' }}
  cancel-in-progress: true

jobs:
  automerge:
    uses: topcoder1/ci-workflows/.github/workflows/safe-paths-automerge.yml@main
    secrets: inherit
    with:
      merge_method: squash
