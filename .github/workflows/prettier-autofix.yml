name: Prettier Autofix

# Caller for the reusable prettier-autofix workflow in topcoder1/ci-workflows.
# When a PR lands with formatting drift, this workflow runs
# `prettier --write` on the PR-changed files matching the reusable's
# default glob `**/*.{md,yml,yaml,json}` — markdown, YAML, and JSON,
# not just markdown (the `markdown_glob` input name is historical) —
# and pushes the fix back as a `style: prettier auto-fix` commit. The
# downstream lint check then re-runs on the new SHA and goes green
# automatically.
#
# Pairs with `lint.yml` (the read-only check), but note the lint
# check's default scope is `**/*.md` only — autofix rewrites YAML/JSON
# files lint never flags. To exempt a file from autofix (e.g. a
# generated artifact like docs/openapi.json), add it to
# `.prettierignore`. If you override `markdown_glob` or `changed_only`
# here, mirror the values in `lint.yml` so the check and the fixer
# agree.
#
# Required repo secret: `AUTOMERGE_PAT` — same secret consumed by
# `claude-author-automerge.yml`. Required scopes: `Contents: read and
# write`, `Pull-requests: read and write`. Pushes by the default
# GITHUB_TOKEN do NOT retrigger pull_request workflows, so a real
# PAT is required for the autofix to clear the red lint check.
#
# Why explicit secret pass instead of `secrets: inherit`: GitHub's
# `secrets: inherit` does NOT propagate across organization boundaries
# when calling a reusable in a different org's repo. Since
# `topcoder1/ci-workflows` is called from both `topcoder1/*` and
# `whois-api-llc/*` repos, explicit pass is the only pattern that
# works in both contexts. Verified 2026-05-10: same-org `secrets:
# inherit` worked on topcoder1/ipgeo_core; cross-org failed at
# startup on whois-api-llc/wxa-graph with "Secret automerge_pat is
# required, but not provided while calling."

on:
  pull_request:

permissions:
  # The reusable's checkout step uses the PAT for auth, but `contents: write`
  # at the caller level is still needed to allow the runner to perform the
  # push at all. `pull-requests: read` is needed for the changed-files
  # API call.
  contents: write
  pull-requests: read

jobs:
  prettier-autofix:
    uses: topcoder1/ci-workflows/.github/workflows/prettier-autofix.yml@main
    secrets:
      automerge_pat: ${{ secrets.AUTOMERGE_PAT }}
