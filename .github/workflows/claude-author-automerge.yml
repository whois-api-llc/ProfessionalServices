name: Claude-author Auto-merge

# Auto-enables `gh pr merge --auto --squash` on PRs authored by Claude
# (branch `claude/*`, `Co-Authored-By: Claude` trailer, or `auto-merge`
# label) — unless the diff touches a risk-tier path category from your
# global CLAUDE.md policy. See:
# https://github.com/topcoder1/ci-workflows/blob/main/.github/workflows/claude-author-automerge.yml

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

# Reusable workflow's job-level permissions are CAPPED by these.
permissions:
  contents: write
  pull-requests: write

# The group key partitions runs by the payload's draft flag, not just
# per-PR. A stale draft-payload `synchronize` run is a guaranteed no-op
# (the reusable's draft gate), yet in a shared group it can cancel (or
# replace, if queued) the ready_for_review run, leaving auto-merge
# silently un-enabled (same race as pr-classify.yml — attaxion_dev#303,
# 2026-07-06). Quarantining draft-payload runs fixes that while
# non-draft runs keep today's supersede semantics: a newer push still
# cancels an in-flight stale run before it can arm auto-merge from
# pre-push state.
concurrency:
  group: claude-author-automerge-${{ github.event.pull_request.number }}-${{ github.event.pull_request.draft && 'draft' || 'live' }}
  cancel-in-progress: true

jobs:
  automerge:
    uses: topcoder1/ci-workflows/.github/workflows/claude-author-automerge.yml@main
    secrets: inherit
    with:
      merge_method: squash
